name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sop-web/pnpm-lock.yaml

      - name: Install dependencies (root workspace)
        working-directory: sop-web
        run: pnpm install --frozen-lockfile

      - name: Typecheck — frontend
        working-directory: sop-web/frontend
        run: pnpm typecheck

      - name: Typecheck — functions
        working-directory: sop-web/functions
        run: pnpm typecheck

      - name: Unit tests — frontend
        working-directory: sop-web/frontend
        run: pnpm test

      - name: Build — frontend
        working-directory: sop-web/frontend
        run: pnpm build

      - name: Build — functions
        working-directory: sop-web/functions
        run: pnpm build
