# IR (Intermediate Representation) Schema
# Version: 1.0
# 用於描述一份 SOP 的完整結構

$schema: "http://json-schema.org/draft-07/schema#"
title: "SOP Intermediate Representation"

type: object
required: [sop]
properties:
  sop:
    type: object
    required: [metadata, context, steps]
    properties:

      # ==========================================
      # metadata: 基本資訊
      # ==========================================
      metadata:
        type: object
        required: [sop_id, title, version, target_audience, last_updated]
        properties:
          sop_id:
            type: string
            description: "系統識別碼，跨版本不變。建議格式：kebab-case（如 ec2-provisioning）"
            pattern: "^[a-z0-9-]+$"
          title:
            type: string
            description: "文件標題（繁體中文）"
          version:
            type: string
            description: "semver 格式：1.4.0"
            pattern: "^\\d+\\.\\d+\\.\\d+$"
          target_audience:
            type: string
            description: "適用對象，如「新進員工 / 工作 0-3 個月」"
          estimated_duration:
            type: string
            description: "預估學習時間，如「約 30 分鐘」"
          difficulty:
            type: string
            enum: [初級, 中級, 進階]
          category:
            type: string
            description: "分類，如「AWS 操作」「n8n 自動化」「資安」等"
          tags:
            type: array
            items: {type: string}
          authors:
            type: array
            items: {type: string}
          last_updated:
            type: string
            format: date-time
            description: "ISO8601 格式，必須含 GMT+8 時區（+08:00）"
          last_reviewed:
            type: string
            format: date-time

      # ==========================================
      # context: 背景與前置
      # ==========================================
      context:
        type: object
        required: [why_this_matters, learning_objectives]
        properties:
          why_this_matters:
            type: string
            description: "為什麼新人要學這個（內訓關鍵欄位）"
          learning_objectives:
            type: array
            description: "讀完這份你會做什麼"
            items: {type: string}
          prerequisites:
            type: object
            properties:
              knowledge:
                type: array
                items:
                  type: object
                  required: [description]
                  properties:
                    description: {type: string}
                    recommended_resource: {type: string}
              access:
                type: array
                items:
                  type: object
                  required: [resource]
                  properties:
                    resource: {type: string}
                    how_to_request: {type: string}
              tools:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string}
                    version: {type: string}
                    install_guide: {type: string}

      # ==========================================
      # glossary: 術語表
      # ==========================================
      glossary:
        type: array
        items:
          type: object
          required: [term, definition]
          properties:
            term: {type: string}
            definition: {type: string}
            first_appears_in:
              type: string
              description: "對應的 step_id"
            aliases:
              type: array
              items: {type: string}

      # ==========================================
      # steps: 操作步驟（核心）
      # ==========================================
      steps:
        type: array
        items:
          type: object
          required: [id, display_order, title, description]
          properties:
            id:
              type: string
              description: "穩定 ID，跨版本不變。格式：step-{uuid8} 或 step-{slug}-{hash4}"
              pattern: "^step-[a-z0-9-]+$"
            display_order:
              type: integer
              description: "顯示順序（可變，與 ID 解耦）"
            title:
              type: string
              description: "步驟簡短標題"
            description:
              type: string
              description: "一句話說明這步要做什麼"
            detailed_action:
              type: string
              description: "給新人看的詳細操作描述"
            rationale:
              type: string
              description: "為什麼要這樣做（內訓重要）"

            visual_refs:
              type: array
              description: "對應的截圖"
              items:
                type: object
                required: [image_id]
                properties:
                  image_id:
                    type: string
                    description: "對映 assets/images.yaml 的 ID"
                  caption: {type: string}
                  highlight_areas:
                    type: array
                    description: "截圖中要標紅框的區域"
                    items:
                      type: object
                      required: [x, y, width, height]
                      properties:
                        x: {type: integer}
                        y: {type: integer}
                        width: {type: integer}
                        height: {type: integer}
                        label: {type: string}

            code_blocks:
              type: array
              items:
                type: object
                required: [language, content]
                properties:
                  language:
                    type: string
                    description: "bash | python | yaml | sql 等"
                  content: {type: string}
                  explanation: {type: string}

            verification:
              type: object
              description: "如何確認做對了"
              properties:
                method: {type: string}
                expected_result: {type: string}

            common_mistakes:
              type: array
              items:
                type: object
                required: [mistake, fix]
                properties:
                  mistake: {type: string}
                  fix: {type: string}

            tips:
              type: array
              items: {type: string}

            warnings:
              type: array
              items: {type: string}

            permissions_used:
              type: array
              items: {type: string}

            estimated_time:
              type: string

            version_added:
              type: string
              description: "這步驟在哪個版本加入"
            last_modified:
              type: string
              description: "最後實質修改的版本"

            source_refs:
              type: array
              description: "資訊來源，更新功能會用到"
              items:
                $ref: "#/definitions/SourceRef"

      # ==========================================
      # troubleshooting: 排解清單
      # ==========================================
      troubleshooting:
        type: array
        items:
          type: object
          required: [id, symptom, solution]
          properties:
            id:
              type: string
              pattern: "^ts-[a-z0-9-]+$"
            symptom: {type: string}
            possible_causes:
              type: array
              items: {type: string}
            solution: {type: string}
            related_steps:
              type: array
              items: {type: string}
            severity:
              type: string
              enum: [info, warning, critical]
            source_refs:
              type: array
              items:
                $ref: "#/definitions/SourceRef"

      # ==========================================
      # further_reading: 進階學習資源
      # ==========================================
      further_reading:
        type: array
        items:
          type: object
          required: [title]
          properties:
            title: {type: string}
            url: {type: string}
            description: {type: string}

      # ==========================================
      # changelog: 變更紀錄
      # ==========================================
      changelog:
        type: array
        items:
          type: object
          required: [version, date, summary]
          properties:
            version: {type: string}
            date:
              type: string
              format: date-time
            author: {type: string}
            summary:
              type: string
              description: "給管理者看的高階摘要"
            changes:
              type: array
              items:
                type: object
                required: [type, description]
                properties:
                  type:
                    type: string
                    enum: [added, modified, removed, restructured]
                  target: {type: string}
                  description: {type: string}
                  rationale: {type: string}
            affected_sections:
              type: array
              items: {type: string}
            requires_retraining:
              type: boolean
              description: "是否需要重新訓練學員"

      # ==========================================
      # quality_checks: 品質檢查狀態
      # ==========================================
      quality_checks:
        type: object
        properties:
          last_checked:
            type: string
            format: date-time
          issues:
            type: array
            items:
              type: object
              required: [type, description, severity, status]
              properties:
                type:
                  type: string
                  enum: [gap, inconsistency, outdated, needs_human_input]
                description: {type: string}
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                location: {type: string}
                status:
                  type: string
                  enum: [open, acknowledged, resolved]


# ==========================================
# 共用定義
# ==========================================
definitions:
  SourceRef:
    type: object
    required: [type, file]
    properties:
      type:
        type: string
        enum: [interview, doc, pdf, screenshot, change_list, meeting_notes, manual]
      file:
        type: string
        description: "原始檔案路徑或名稱"
      location:
        type: string
        description: "line-87 / page-3 / image-id 等"
      confidence:
        type: number
        minimum: 0
        maximum: 1
        description: "0-1，這段資訊的可信度"
      excerpt:
        type: string
        description: "原始素材的相關片段（debug 用）"
