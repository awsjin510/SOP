# 完整 IR 範例：EC2 實例啟動標準作業程序
# 此檔可做為 sop-trainer 的目標輸出範本，也可做為 sop-updater 的測試輸入

sop:

  # ==========================================
  # metadata
  # ==========================================
  metadata:
    sop_id: "ec2-provisioning"
    title: "EC2 實例啟動標準作業程序"
    version: "1.3.0"
    target_audience: "新進雲端工程師 / 入職 0-3 個月"
    estimated_duration: "約 30 分鐘"
    difficulty: "初級"
    category: "AWS 操作"
    tags: ["aws", "ec2", "新人必學"]
    authors:
      - "雲端團隊"
    last_updated: "2026-04-15T10:30:00+08:00"
    last_reviewed: "2026-04-15T10:30:00+08:00"

  # ==========================================
  # context
  # ==========================================
  context:
    why_this_matters: |
      EC2 實例是公司客戶上雲最常用的服務之一，也是新人接觸 AWS 的第一站。
      正確啟動 EC2 不只是按按鈕，更牽涉到資安政策、成本控制、可用性設計。
      錯誤的設定可能導致資料外洩、帳單暴增或服務中斷。

    learning_objectives:
      - "獨立完成一台符合公司資安政策的 EC2 啟動"
      - "理解每個設定背後的考量"
      - "遇到常見錯誤能自行排解"

    prerequisites:
      knowledge:
        - description: "AWS 基本概念（Region、AZ、VPC）"
          recommended_resource: "新人訓練文件 - AWS 入門"
        - description: "Linux 基本指令"
      access:
        - resource: "AWS Console 存取權"
          how_to_request: "向 IT 申請加入 cloud-team-readonly group"
        - resource: "客戶帳號 sandbox 環境"
          how_to_request: "向 team lead 申請臨時 IAM Role"
      tools:
        - name: "AWS CLI"
          version: "2.x"
          install_guide: "https://docs.aws.amazon.com/cli/latest/userguide/install.html"

  # ==========================================
  # glossary
  # ==========================================
  glossary:
    - term: "Security Group"
      definition: "AWS 中作為虛擬防火牆的功能，控制 EC2 的進出流量"
      first_appears_in: "step-sg-config-a3f2"
      aliases: ["SG", "安全群組"]
    - term: "AMI"
      definition: "Amazon Machine Image，包含作業系統與預裝軟體的映像檔"
      first_appears_in: "step-ami-select-b8c1"
    - term: "堡壘機"
      definition: "唯一允許 SSH 進入內部網路的跳板機，所有遠端管理都要經過它"
      first_appears_in: "step-sg-config-a3f2"
      aliases: ["bastion", "jump server"]

  # ==========================================
  # steps
  # ==========================================
  steps:

    - id: "step-login-aws-d4e1"
      display_order: 1
      title: "登入 AWS Console"
      description: "使用 SSO 登入到客戶帳號的 Console"
      detailed_action: |
        1. 開啟瀏覽器到 https://cloudorange.awsapps.com/start
        2. 用公司 Email 登入 SSO
        3. 在帳號清單中選擇要操作的客戶帳號
        4. 點選「Management Console」
      rationale: |
        我們不允許直接用 IAM User 登入，所有操作都要走 SSO 留下完整稽核紀錄。
        這是公司資安政策強制要求，違反會被資安團隊追查。
      visual_refs:
        - image_id: "img-sso-login"
          caption: "SSO 登入畫面，注意網址是 cloudorange.awsapps.com"
      verification:
        method: "右上角應顯示『公司 Email + 客戶帳號名稱』"
        expected_result: "進入到客戶帳號的 AWS Console 首頁"
      common_mistakes:
        - mistake: "選錯客戶帳號"
          fix: "右上角點開帳號選單可以快速切換，不用重新登入"
      tips:
        - "可把常用帳號加到瀏覽器書籤，但 URL 不要含 region（會卡死在錯的 region）"
      warnings:
        - "絕對不要用個人 IAM 登入或他人帳號登入"
      permissions_used:
        - "AWS SSO"
      estimated_time: "1 分鐘"
      version_added: "1.0.0"
      last_modified: "1.0.0"
      source_refs:
        - type: "interview"
          file: "interview-2026-03-cloud-team.txt"
          location: "line-45"
          confidence: 0.95

    - id: "step-ami-select-b8c1"
      display_order: 2
      title: "選擇 AMI"
      description: "從公司核可清單選擇 AMI"
      detailed_action: |
        1. 在 EC2 主頁點選「Launch Instance」
        2. AMI 必須選擇 owner 為 cloud-team 的 AMI
        3. 預設使用 `cloudorange-ubuntu-22.04-hardened-{date}`（最新日期）
      rationale: |
        公司核可的 AMI 已經做過資安強化（關閉不必要服務、預裝監控 agent、
        設定 log forwarding）。直接用 AWS Marketplace 的 AMI 會缺少這些東西，
        資安團隊定期掃描會發現並開告警。
      visual_refs:
        - image_id: "img-ami-select"
          caption: "選擇 AMI 畫面，篩選 owner 欄位輸入 cloud-team"
          highlight_areas:
            - {x: 120, y: 240, width: 200, height: 30, label: "owner 篩選"}
      verification:
        method: "AMI 描述應顯示 'CloudOrange hardened image'"
      common_mistakes:
        - mistake: "選到 Public AMI"
          fix: "owner 欄位確認是 cloud-team，不是 amazon 或 self"
      warnings:
        - "千萬不要選 Marketplace AMI，會被資安團隊退件"
      version_added: "1.0.0"
      last_modified: "1.2.0"
      source_refs:
        - type: "interview"
          file: "interview-2026-03-cloud-team.txt"
          location: "line-78"
          confidence: 0.92
        - type: "doc"
          file: "security-policy-2026.docx"
          location: "section-3.2"
          confidence: 0.98

    - id: "step-sg-config-a3f2"
      display_order: 3
      title: "設定 Security Group"
      description: "設定符合最小權限原則的 SG"
      detailed_action: |
        1. 建立新 SG（不要用 default）
        2. 命名規則：`sg-{專案名}-{用途}-{環境}`，例如 `sg-customerA-web-prod`
        3. 入站規則只開：
           - 22 port：來源限制為堡壘機 IP（10.0.1.0/24）
           - 80/443 port：如果這台是 web server 才開，且來源是 ALB SG
        4. 出站規則保持預設（all traffic）
      rationale: |
        最小權限原則。開放越多 port 攻擊面越大。
        22 port 開給 0.0.0.0/0 是最常見的安全事件來源（brute force）。
        要 SSH 進去一律走堡壘機，留稽核紀錄。
      visual_refs:
        - image_id: "img-sg-config"
          caption: "SG 入站規則設定範例"
      verification:
        method: "SG 入站規則應只有必要的 port，且來源都是內部網段或特定 SG"
        expected_result: "沒有任何規則的 source 是 0.0.0.0/0（除非是 ALB 的 80/443）"
      common_mistakes:
        - mistake: "為了測試方便開 22 to 0.0.0.0/0"
          fix: "用堡壘機 + SSM Session Manager，不要直接對外開 SSH"
        - mistake: "用 default SG"
          fix: "default SG 跨服務共用會混亂，每個用途建獨立 SG"
      tips:
        - "命名規則嚴格遵守，不然 30 個 SG 之後會找不到哪個是哪個"
      warnings:
        - "0.0.0.0/0 + 22 port 的組合會直接觸發資安告警"
      permissions_used:
        - "ec2:CreateSecurityGroup"
        - "ec2:AuthorizeSecurityGroupIngress"
      estimated_time: "5 分鐘"
      version_added: "1.0.0"
      last_modified: "1.3.0"
      source_refs:
        - type: "interview"
          file: "interview-2026-03-cloud-team.txt"
          location: "line-120"
          confidence: 0.95

  # ==========================================
  # troubleshooting
  # ==========================================
  troubleshooting:

    - id: "ts-instance-launch-failed"
      symptom: "啟動實例時出現「InsufficientInstanceCapacity」"
      possible_causes:
        - "該 AZ 暫時沒有該實例類型的容量"
        - "選了過於小眾的實例類型"
      solution: |
        1. 嘗試切換到同 region 其他 AZ
        2. 或改用同等級的其他實例類型（如 t3 → t3a）
        3. 持續無法解決時聯絡 AWS Support
      related_steps: ["step-ami-select-b8c1"]
      severity: "warning"
      source_refs:
        - type: "interview"
          file: "interview-2026-03-cloud-team.txt"
          location: "line-200"
          confidence: 0.9

    - id: "ts-cant-ssh"
      symptom: "啟動成功但 SSH 連不上"
      possible_causes:
        - "SG 沒開 22 port"
        - "走錯網路路徑（沒走堡壘機）"
        - "Key pair 用錯"
      solution: |
        檢查順序：
        1. 確認從堡壘機嘗試連線（不要從筆電直連）
        2. 檢查 SG 入站規則是否允許堡壘機 IP
        3. 確認用的是建立實例時指定的 key pair
      related_steps: ["step-sg-config-a3f2"]
      severity: "warning"
      source_refs:
        - type: "interview"
          file: "interview-2026-03-cloud-team.txt"
          location: "line-220"
          confidence: 0.95

