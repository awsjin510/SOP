# Change Intent Schema
# Version: 1.0
# 用於描述「對 SOP 的單一變更意圖」

$schema: "http://json-schema.org/draft-07/schema#"
title: "Change Intent"

type: object
required: [change_intents]
properties:
  meta:
    type: object
    required: [from_version, generated_at]
    properties:
      from_version:
        type: string
        description: "本次變更的起始版本，如 1.3.0"
      to_version:
        type: string
        description: "預計產出的目標版本（套用後才能確定）"
      generated_at:
        type: string
        format: date-time
      generator: {type: string}
      sop_id: {type: string}

  change_intents:
    type: array
    items:
      type: object
      required: [id, type, sources, aggregated_confidence]
      properties:

        id:
          type: string
          description: "本次變更批次中的唯一 ID"
          pattern: "^change-[0-9]+$"

        # 變更類型
        type:
          type: string
          enum:
            - add_step              # 新增步驟
            - modify_step           # 修改步驟（特定欄位）
            - remove_step           # 移除步驟
            - reorder_steps         # 重新排序步驟
            - add_troubleshooting   # 新增 troubleshooting
            - modify_troubleshooting
            - remove_troubleshooting
            - add_glossary
            - modify_glossary
            - update_metadata       # metadata 層級變更
            - update_screenshot     # 純截圖更新
            - restructure           # 大規模重構

        # 目標位置
        target:
          type: object
          properties:
            step_id:
              type: string
              description: "對 modify/remove 必填；對 add 是「插入位置」參考點"
            ts_id:
              type: string
              description: "troubleshooting 變更時用"
            field:
              type: string
              description: "對 modify_step 必填，指定哪個欄位"
              examples:
                - "detailed_action"
                - "rationale"
                - "verification.method"
                - "visual_refs"
            insertion:
              type: string
              enum: [before, after, replace]
              description: "對 add_step 用，指定相對於 target.step_id 的位置"

        # 變更內容
        change:
          type: object
          properties:
            description:
              type: string
              description: "這次變更的人類可讀描述"
            old_content:
              description: "原內容（modify/remove 用）"
            new_content:
              description: "新內容（add/modify 用）"
            new_step:
              description: "完整的新步驟物件（add_step 用，符合 IR step schema）"
              type: object

        # 變更原因
        rationale:
          type: string
          description: "為什麼要這樣改"

        # 來源（多個來源時）
        sources:
          type: array
          minItems: 1
          items:
            type: object
            required: [type, ref, confidence]
            properties:
              type:
                type: string
                enum:
                  - change_list
                  - meeting_notes
                  - change_note
                  - interview
                  - conversation
                  - pdf_release_note
                  - pdf_other
                  - screenshot
                  - human_instruction
              ref:
                type: string
                description: "檔案路徑 + 位置，如 'modifications.docx:row-3' 或 'meeting.txt:line-87'"
              confidence:
                type: number
                minimum: 0
                maximum: 1
              excerpt:
                type: string
                description: "原始素材的相關片段，方便除錯與驗證"
              extracted_at:
                type: string
                format: date-time

        # 信心評估
        aggregated_confidence:
          type: number
          minimum: 0
          maximum: 1
          description: "綜合信心，多源印證會提升此值"

        # 意圖明確度
        intent_type:
          type: string
          enum: [explicit_change, implied_supplement]
          description: "明確變更 vs 隱含補充"
          default: "explicit_change"

        # 連帶影響
        affects_other_steps:
          type: array
          items: {type: string}
          description: "可能受到連帶影響的其他 step_id"

        requires_screenshot_update:
          type: boolean
          default: false
          description: "是否需要更新對應的截圖"

        requires_text_update:
          type: boolean
          default: false
          description: "（用於截圖變更）是否需要連帶更新文字描述"

        # 審核狀態
        consolidated:
          type: boolean
          default: false
          description: "是否由多個原始變更合併而成"

        needs_human_review:
          type: boolean
          default: false
          description: "是否需要人工審核（信心低、有衝突、含糊等）"

        review_reason:
          type: string
          description: "為什麼需要人工審核"

        review_status:
          type: string
          enum: [pending, accepted, rejected, edited, deferred]
          default: "pending"

        review_notes:
          type: string
          description: "審核者備註"

  # ==========================================
  # 衝突清單
  # ==========================================
  conflicts:
    type: array
    items:
      type: object
      required: [id, type, description, needs_human_review]
      properties:
        id:
          type: string
          pattern: "^conflict-[0-9]+$"
        type:
          type: string
          enum:
            - ambiguous_target          # 不確定改哪一步
            - content_contradiction     # 素材間矛盾
            - cascade_inconsistency     # 連帶不一致
            - source_contradiction      # 同一變更多源說法不同
        description:
          type: string
        related_change_ids:
          type: array
          items: {type: string}
        candidates:
          type: array
          description: "可能的目標步驟（ambiguous_target 用）"
          items: {type: string}
        sources_in_conflict:
          type: array
          description: "互相矛盾的來源（content/source_contradiction 用）"
          items:
            type: object
            properties:
              source: {type: object}
              says: {type: string}
        suggested_resolution:
          type: string
        needs_human_review:
          type: boolean
        resolution:
          type: string
          enum: [pending, resolved_by_human, resolved_by_rule]
        resolution_notes:
          type: string

  # ==========================================
  # 完整性問題
  # ==========================================
  completeness_issues:
    type: array
    items:
      type: object
      required: [id, type, severity, description]
      properties:
        id:
          type: string
          pattern: "^completeness-[0-9]+$"
        type:
          type: string
          enum:
            - screenshot_outdated      # 截圖未隨步驟更新
            - prerequisites_outdated   # 前置需求未更新
            - troubleshooting_outdated # troubleshooting 引用舊操作
            - glossary_missing         # 新術語未加入術語表
            - related_steps_inconsistent # 相關步驟不一致
        severity:
          type: string
          enum: [low, medium, high, critical]
        description:
          type: string
        related_change_ids:
          type: array
          items: {type: string}
        affected_locations:
          type: array
          items: {type: string}
        suggestion:
          type: string
        auto_fixable:
          type: boolean
          default: false
        status:
          type: string
          enum: [open, acknowledged, resolved, deferred]
          default: open
