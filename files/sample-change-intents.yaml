  - id: "change-003"
    type: "add_troubleshooting"
    change:
      description: "新增 SSO Session 過期的排解"
      new_content:
        id: "ts-sso-timeout"
        symptom: "操作中突然被登出，回到 SSO 登入頁"
        possible_causes:
          - "SSO Session 預設 8 小時自動過期"
          - "切換網路（如從公司 wifi 切到手機熱點）"
        solution: |
          1. 重新登入 SSO 即可
          2. 如果一天內反覆發生，檢查網路是否不穩定
          3. 重要操作前先檢查 Session 剩餘時間（右上角頭像點開可看）
